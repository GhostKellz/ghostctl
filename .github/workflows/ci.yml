name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Security: Use SHA-pinned actions for supply-chain security
# To update, verify new releases and pin to commit SHA:
#   actions/checkout: https://github.com/actions/checkout/releases
#   Swatinem/rust-cache: https://github.com/Swatinem/rust-cache/releases

env:
  CARGO_TERM_COLOR: always

jobs:
  # PR builds from external contributors use GitHub-hosted runners for security
  # Self-hosted runners are only used for trusted push events to main
  build-and-test:
    name: Build & Test
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'ubuntu-latest' || 'self-hosted' }}
    timeout-minutes: 20
    env:
      # Set cargo/rustc paths based on runner type
      CARGO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cargo' || '/home/runner/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/bin/cargo' }}
      RUSTC: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'rustc' || '/home/runner/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/bin/rustc' }}
      RUSTFMT: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'rustfmt' || '/home/runner/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/bin/rustfmt' }}
    steps:
      - name: Checkout
        # SHA pin: actions/checkout@v4.1.7 (2024-07-16)
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Security regression guards
        run: |
          set -euo pipefail

          echo "Checking for forbidden docker login -p usage..."
          if git grep -nE 'docker"\)\s*\.args\(\[[^]]*"-p"' -- 'ghostctl/src/**/*.rs'; then
            echo "ERROR: Found forbidden docker login -p usage"
            exit 1
          fi

          echo "Checking for forbidden docker socket chmod 666..."
          if git grep -n 'chmod", "666", "/var/run/docker.sock"' -- 'ghostctl/src/**/*.rs'; then
            echo "ERROR: Found forbidden chmod 666 on docker socket"
            exit 1
          fi

          echo "Checking for shell interpolation in hardened networking modules..."
          if git grep -nE 'Command::new\("(sh|bash)"\)\s*\.arg\("-c"' -- \
            ghostctl/src/networking/firewall.rs \
            ghostctl/src/networking/advanced_firewall.rs \
            ghostctl/src/networking/troubleshoot.rs; then
            echo "ERROR: Found forbidden shell interpolation in networking modules"
            exit 1
          fi

          echo "Security regression checks passed"

      - name: Setup Rust (GitHub-hosted only)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 liblua5.4-dev pkg-config libssl-dev libdbus-1-dev

      - name: Verify Environment
        run: |
          echo "=== Rust Toolchain ==="
          $RUSTC --version
          $CARGO --version

      - name: Cache Rust dependencies
        # SHA pin: Swatinem/rust-cache@v2.7.3 (2024-05-08)
        uses: Swatinem/rust-cache@23bce251a8cd2ffc3c1075eaa2367cf899916d84
        with:
          workspaces: ghostctl
          key: ghostctl-ci

      - name: Check formatting
        run: cd ghostctl && $CARGO fmt --check

      - name: Run clippy
        run: cd ghostctl && $CARGO clippy --release -- -D warnings

      - name: Build release
        run: cd ghostctl && $CARGO build --release

      - name: Run tests
        run: cd ghostctl && $CARGO test

      - name: CLI Smoke Test
        run: |
          set -euo pipefail
          GHOSTCTL="./ghostctl/target/release/ghostctl"

          echo "=== Basic Commands ==="
          $GHOSTCTL version
          $GHOSTCTL --help > /dev/null

          echo ""
          echo "=== Command Help ==="
          $GHOSTCTL system --help > /dev/null
          $GHOSTCTL docker --help > /dev/null
          $GHOSTCTL arch --help > /dev/null
          $GHOSTCTL network --help > /dev/null

          echo ""
          echo "=== List Commands ==="
          $GHOSTCTL list

          echo ""
          echo "CLI smoke tests passed"

      - name: CLI Test Suite
        run: |
          set -euo pipefail
          GHOSTCTL="./ghostctl/target/release/ghostctl"
          PASSED=0
          FAILED=0

          test_cmd() {
            local name="$1"
            local cmd="$2"
            if $GHOSTCTL $cmd > /dev/null 2>&1; then
              echo "[PASS] $name"
              PASSED=$((PASSED + 1))
            else
              echo "[FAIL] $name"
              FAILED=$((FAILED + 1))
            fi
          }

          echo "=== CLI Commands ==="
          test_cmd "version" "version"
          test_cmd "help" "--help"
          test_cmd "list" "list"
          test_cmd "system help" "system --help"
          test_cmd "dev help" "dev --help"
          test_cmd "docker help" "docker --help"
          test_cmd "arch help" "arch --help"
          test_cmd "network help" "network --help"
          test_cmd "security help" "security --help"
          test_cmd "backup help" "backup --help"
          test_cmd "nvidia help" "nvidia --help"
          test_cmd "btrfs help" "btrfs --help"
          test_cmd "cloud help" "cloud --help"
          test_cmd "tools help" "tools --help"

          echo ""
          echo "Results: $PASSED passed, $FAILED failed"

          if [[ $FAILED -gt 0 ]]; then
            exit 1
          fi

      - name: Build Summary
        run: |
          echo "### Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Binary | $(ls -lh ./ghostctl/target/release/ghostctl | awk '{print $5}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust | $($RUSTC --version | cut -d' ' -f2) |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | Passed |" >> $GITHUB_STEP_SUMMARY
