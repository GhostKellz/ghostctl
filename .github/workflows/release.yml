name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Security: Use SHA-pinned actions for supply-chain security.
# Node 24-based actions require self-hosted runners >= 2.327.1.
# Release workflows are high-value targets - always verify action SHAs

env:
  CARGO: /home/runner/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/bin/cargo
  RUSTC: /home/runner/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/bin/rustc

jobs:
  release-linux:
    name: Build Linux Release
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        # SHA pin: actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 liblua5.4-dev pkg-config libssl-dev libdbus-1-dev

      - name: Verify Environment
        run: |
          echo "=== Linux Release Build ==="
          echo "Tag: ${{ github.ref_name }}"
          $RUSTC --version
          $CARGO --version

      - name: Cache Rust dependencies
        # SHA pin: Swatinem/rust-cache@v2.9.1
        uses: Swatinem/rust-cache@c106961feec855ef5a58494c5a2a31c9d80429a9
        with:
          workspaces: ghostctl
          key: ghostctl-release-linux

      - name: Run Tests
        run: cd ghostctl && $CARGO test

      - name: Build Linux Release
        run: cd ghostctl && $CARGO build --release

      - name: Create Linux Archive
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          TARGET="x86_64-unknown-linux-gnu"
          ARCHIVE_DIR="ghostctl-${VERSION}-${TARGET}"
          BINARY="./ghostctl/target/release/ghostctl"

          mkdir -p "$ARCHIVE_DIR/completions"
          cp "$BINARY" "$ARCHIVE_DIR/ghostctl"
          cp README.md "$ARCHIVE_DIR/" 2>/dev/null || true
          cp LICENSE "$ARCHIVE_DIR/" 2>/dev/null || true
          cp CHANGELOG.md "$ARCHIVE_DIR/" 2>/dev/null || true
          cp man/ghostctl.1 "$ARCHIVE_DIR/" 2>/dev/null || true
          cp install.sh "$ARCHIVE_DIR/" 2>/dev/null || true

          # Generate shell completions from built binary
          "$BINARY" completion bash > "$ARCHIVE_DIR/completions/ghostctl.bash"
          "$BINARY" completion zsh > "$ARCHIVE_DIR/completions/_ghostctl"
          "$BINARY" completion fish > "$ARCHIVE_DIR/completions/ghostctl.fish"

          tar -czvf "ghostctl-${VERSION}-${TARGET}.tar.gz" "$ARCHIVE_DIR"

          echo "=== Linux Archive Contents ==="
          tar -tzvf "ghostctl-${VERSION}-${TARGET}.tar.gz"
          ls -lh "ghostctl-${VERSION}-${TARGET}.tar.gz"

      - name: Generate SHA256 Checksum
        run: |
          VERSION="${{ github.ref_name }}"
          TARGET="x86_64-unknown-linux-gnu"
          sha256sum "ghostctl-${VERSION}-${TARGET}.tar.gz" > "ghostctl-${VERSION}-${TARGET}.tar.gz.sha256"
          cat "ghostctl-${VERSION}-${TARGET}.tar.gz.sha256"

      - name: Upload Linux Artifacts
        # SHA pin: actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: linux-release
          path: |
            ghostctl-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            ghostctl-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256

  create-release:
    name: Create GitHub Release
    needs: [release-linux]
    runs-on: self-hosted
    steps:
      - name: Checkout
        # SHA pin: actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Download All Artifacts
        # SHA pin: actions/download-artifact@v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: release-artifacts

      - name: List Artifacts
        run: |
          echo "=== Release Artifacts ==="
          find release-artifacts -type f -ls

      - name: Create GitHub Release
        # SHA pin: softprops/action-gh-release@v3.0.1
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: |
            release-artifacts/linux-release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          body: |
            ## GhostCTL ${{ github.ref_name }}

            Ghost Infrastructure Control - Complete system and homelab management toolkit.

            ### Downloads

            | Platform | File | Checksum |
            |----------|------|----------|
            | **Linux (x86_64)** | `ghostctl-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz` | `.sha256` |

            ### Quick Install

            **Linux (curl)**
            ```bash
            curl -sSL https://raw.githubusercontent.com/ghostkellz/ghostctl/main/install.sh | bash
            ```

            **Linux (manual)**
            ```bash
            tar -xzf ghostctl-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            sudo cp ghostctl-${{ github.ref_name }}-x86_64-unknown-linux-gnu/ghostctl /usr/local/bin/
            ghostctl version
            ```

            **Arch Linux (AUR)**
            ```bash
            yay -S ghostctl
            # or
            paru -S ghostctl
            ```

            ### Verify Checksum

            ```bash
            sha256sum -c ghostctl-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256
            ```

            ### Documentation

            - [Getting Started](https://github.com/ghostkellz/ghostctl#readme)
            - [Commands Reference](https://github.com/ghostkellz/ghostctl/blob/main/docs/reference/COMMANDS.md)
            - [Documentation](https://github.com/ghostkellz/ghostctl/blob/main/docs/README.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "### Release ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x86_64 | Published |" >> $GITHUB_STEP_SUMMARY
